<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../../assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora de IMC</title>
</head>
<body>
    
    <main>
    <section aria-labelledby="titulo-calculadora" class="container">
      <h1 id="titulo-calculadora">Calculadora de IMC</h1>
      <form id="formIMC">
        <label for="peso">Peso (kg):</label>
        <input type="number" id="peso" name="peso" min="1" step="0.1" required />

        <label for="altura">Altura (m):</label>
        <input type="number" id="altura" name="altura" min="0.5" max="3" step="0.01" required />

        <button type="submit">Calcular IMC</button>
      </form>

      <div id="resultado" aria-live="polite">
        <span id="icone" aria-hidden="true"></span>
        <span id="textoResultado"></span>
      </div>
    </section>
  </main>

    <script src="script.js"></script>
</body>
</html>
