<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="../../..//assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Validação de Senha!</title>

</head>

<body>
    <div class="container">
        <h2>Crie sua senha</h2>
        <form id="passwordForm" novalidate>
            <label for="passwordInput">Senha</label>
            <input type="password" id="passwordInput" placeholder="Digite sua senha..." autocomplete="off" />
            <div id="passwordMessage" class="message"></div>
        </form>
    </div>

    <script>
        // Seleciona o input e a mensagem
        const passwordInput = document.getElementById('passwordInput');
        const passwordMessage = document.getElementById('passwordMessage');

        // Função que verifica o comprimento da senha
        const checkPasswordStrength = () => {
            const senha = passwordInput.value;

            // Remove todas as classes para evitar conflito
            passwordMessage.classList.remove('weak', 'strong', 'veryStrong');

            if (senha.length > 12) {
                passwordMessage.textContent = 'Senha muito forte';
                passwordMessage.classList.add('veryStrong');
            } else if (senha.length > 8) {
                passwordMessage.textContent = 'Senha forte';
                passwordMessage.classList.add('strong');
            } else {
                passwordMessage.textContent = 'Senha fraca';
                passwordMessage.classList.add('weak');
            }
        };

        // Adiciona o listener para o evento input (disparado a cada tecla digitada)
        passwordInput.addEventListener('input', checkPasswordStrength);
    </script>
</body>

</html>
